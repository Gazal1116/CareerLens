<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  
  <!-- Briefcase/Portfolio shape -->
  <path d="M 60 70 L 60 130 Q 60 140 70 140 L 130 140 Q 140 140 140 130 L 140 70 Q 140 60 130 60 L 70 60 Q 60 60 60 70 Z" 
        fill="none" stroke="#1976D2" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Handle on briefcase -->
  <path d="M 75 60 Q 100 40 125 60" fill="none" stroke="#1976D2" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Growth arrow inside -->
  <g transform="translate(100, 100)">
    <path d="M -15 10 L 0 -10 L 15 10" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-10" x2="0" y2="15" stroke="#4CAF50" stroke-width="2" stroke-dasharray="4,4"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="130" cy="80" r="3" fill="#FF6F00"/>
  <circle cx="70" cy="125" r="3" fill="#FF6F00"/>
</svg>