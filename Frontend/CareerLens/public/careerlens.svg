<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Main lens circle -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#grad1)" stroke-width="2.5"/>
  
  <!-- Inner lens circle -->
  <circle cx="100" cy="100" r="48" fill="none" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- Lens reflection (small highlight) -->
  <circle cx="85" cy="85" r="12" fill="url(#grad1)" opacity="0.3"/>
  
  <!-- Career growth lines inside lens -->
  <line x1="75" y1="115" x2="100" y2="90" stroke="#667eea" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="90" x2="125" y2="75" stroke="#667eea" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Accent dots on the path -->
  <circle cx="75" cy="115" r="3" fill="#667eea"/>
  <circle cx="100" cy="90" r="3" fill="#764ba2"/>
  <circle cx="125" cy="75" r="3" fill="#667eea"/>
  
  <!-- Small decorative elements -->
  <circle cx="130" cy="100" r="2" fill="#764ba2" opacity="0.6"/>
  <circle cx="70" cy="100" r="2" fill="#667eea" opacity="0.6"/>
  <circle cx="100" cy="145" r="2" fill="#764ba2" opacity="0.6"/>
</svg>